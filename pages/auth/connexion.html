<div>
  <!-- HERO -->
  <div
    class="hero-connexion d-flex align-items-center justify-content-center text-center text-white mb-5">
    <div>
      <h1 class="display-3 fw-bold">Connexion</h1>
    </div>
  </div>

  <div class="container p-3">
    <div class="col">
      <form id="formulaireConnexion">
        <div class="mb-3">
          <input
            type="email"
            class="form-control bg-body-secondary text-center"
            id="emailConnexionInput"
            placeholder="mail@mail.com"
            name="email" />

          <div class="invalid-feedback liens">L'email est requis !</div>
        </div>

        <div class="mb-3">
          <input
            type="password"
            class="form-control bg-body-secondary text-center"
            id="mdpConnexionInput"
            placeholder="Mot de passe"
            name="mdp" />

          <div class="invalid-feedback liens">Le mot de passe est requis !</div>
          <div class="invalid-feedback liens">
            Le mot de passe n'est pas conforme ! <br />
            Au moins 10 caractères comprenant: <br />
            1 lettre majuscule, <br />
            1 lettre miniscule, <br />
            1chiffre et <br />
            1 caractères sepéciale
          </div>
        </div>

        <div class="form-check mb-5">
          <input
            type="checkbox"
            class="form-check-input bg-secondary"
            id="checkConnexionMdp" />
          <label class="form-check-label" for="checkConnexionMdp">
            Afficher le mot de passe
          </label>
        </div>

        <div class="text-center d-flex justify-content-lg-around mb-5">
          <button
            type="button"
            class="btn bg-primary border-primary text-white btn-lg mx-4"
            id="btn-validation-connexion">
            Confirmer
          </button>
          <a href="/">
            <button
              type="button"
              class="btn bg-secondary border-secondary text-bg-danger btn-lg mx-4"
              data-bs-dismiss="modal">
              Annuler
            </button>
          </a>
        </div>
        <div class="text-center mb-3">
          <a href="#" class="text-primary">
            Mot de passe oublié ? Cliquez Ici
          </a>
        </div>
        <div class="text-center mb-3">
          <a href="/inscription" class="text-primary">
            Vous n’avez pas de compte ? Cliquez Ici
          </a>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Modal -->
<div
  class="modal fade"
  id="errorModal"
  tabindex="-1"
  aria-labelledby="errorModalLabel"
  aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content border-success">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title" id="errorModalLabel">Information</h5>
        <button
          type="button"
          class="btn-close btn-close-white"
          data-bs-dismiss="modal"
          aria-label="Fermer"></button>
      </div>
      <div class="modal-body" id="errorModalBodyInscription">
        <!-- Le message d'information sera injecté ici -->
      </div>
      <div class="modal-footer">
        <button
          type="button"
          class="btn bg-danger text-primary"
          data-bs-dismiss="modal">
          Fermer
        </button>
      </div>
    </div>
  </div>
</div>
